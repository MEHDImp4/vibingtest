name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'ARCHITECTURE.md'
      - 'docs/**'
      - '.github/**'
      - '.vscode/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'ARCHITECTURE.md'
      - 'docs/**'
      - '.github/**'
      - '.vscode/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      # Bump patch version using the build number to produce a unique semver
      # e.g. 1.0.0 → 1.0.<run_number>  (1.0.14, 1.0.15, …)
      - name: Set release version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        shell: powershell
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $base = ($pkg.version -split '\.')[ 0..1 ] -join '.'
          $newVersion = "$base.${{ github.run_number }}"
          $content = Get-Content package.json -Raw
          $updated = $content -replace '"version"\s*:\s*"[^"]*"', ('"version": "' + $newVersion + '"')
          Set-Content package.json $updated
          echo "RELEASE_VERSION=$newVersion" >> $env:GITHUB_OUTPUT

      # electron-builder builds AND publishes to GitHub with all required files
      # (latest.yml, .blockmap, .exe) — needs --publish always flag
      - name: Build and Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On PRs / other branches — just build, don't publish
      - name: Build only (no publish)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: npm run build

      - name: Upload Build Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: VoxFlow-Windows-Build
          path: |
            dist/*.exe
            dist/latest.yml
