name: CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'ARCHITECTURE.md'
      - 'docs/**'
      - '.github/**'
      - '.vscode/**'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'ARCHITECTURE.md'
      - 'docs/**'
      - '.github/**'
      - '.vscode/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Linting
        run: npm run lint

      # Bump patch version using the build number to produce a unique semver
      # e.g. 1.0.0 → 1.1.<run_number>
      - name: Set release version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        shell: powershell
        run: |
          $pkg = Get-Content package.json | ConvertFrom-Json
          $newVersion = "1.1.${{ github.run_number }}"
          $content = Get-Content package.json -Raw
          $updated = $content -replace '"version"\s*:\s*"[^"]*"', ('"version": "' + $newVersion + '"')
          Set-Content package.json $updated
          echo "RELEASE_VERSION=$newVersion" >> $env:GITHUB_OUTPUT

      - name: Create Git Tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.RELEASE_VERSION }}
          git push origin v${{ steps.version.outputs.RELEASE_VERSION }}

      # electron-builder builds AND publishes to GitHub with all required files
      - name: Build and Publish
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Release Assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: powershell
        run: |
          $tag = "v${{ steps.version.outputs.RELEASE_VERSION }}"
          Write-Host "Verifying assets for $tag..."
          
          # Check local files first
          if (-not (Test-Path "dist/latest.yml")) { throw "latest.yml missing from dist/" }
          if (-not (Get-ChildItem dist -Filter "*.exe")) { throw "Executable missing from dist/" }
          if (-not (Get-ChildItem dist -Filter "*.blockmap")) { throw "Blockmap missing from dist/" }
          
          # Use gh to verify the release assets on GitHub
          gh release view $tag --json assets --jq '.assets[].name'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # On PRs / other branches — just build, don't publish
      - name: Build only (no publish)
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: npm run build

      - name: Upload Build Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: VoxFlow-Windows-Build
          path: |
            dist/*.exe
            dist/latest.yml
            dist/*.blockmap
